<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сторінка ліцею</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="images.css">
</head>
<body>

    <div class="top-bar">Опорний заклад Нижньосірогозький ліцей</div>

    <header>
        <div class="logo-area"><h1>Опорний заклад Нижньосірогозький ліцей</h1></div>
        <div class="menu-toggle" id="burgerBtn"><span></span><span></span><span></span></div>
    </header>

    <nav><ul class="nav-container" id="navContainer"></ul></nav>
    <ul id="leftMenu" class="school-left-menu"></ul>

    <div class="site-layout inner-page">
        <aside class="sidebar">
            <div class="widget-title">Навігація</div>
            <ul class="school-left-menu"></ul>
        </aside>

        <main class="main-content">
            <h1>Завантаження сторінки...</h1>
            <p>Будь ласка, зачекайте, вміст оновлюється.</p>
        </main>
    </div>

    <footer><p>&copy; 2026 Опорний заклад Нижньосірогозький ліцей</p></footer>

    <script src="cms.js"></script>
    <script>
        // Логіка роботи мобільної шторки (бургер)
        const burgerBtn = document.getElementById('burgerBtn');
        const leftMenu = document.getElementById('leftMenu');
        const navContainer = document.getElementById('navContainer');

        burgerBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            leftMenu.classList.toggle('active');
            navContainer.classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            if (!leftMenu.contains(e.target) && !burgerBtn.contains(e.target)) {
                leftMenu.classList.remove('active');
                navContainer.classList.remove('active');
            }
        });
    </script>
</body>
</html>
